<ul class="list-group">
    <li class="list-group-item list-group-item-secondary text-black-50">
        Zac's Faves
    </li>
    <li class="list-group-item">
      <button 
      class="btn btn-link"
      (click)="promisesAsThenables()">
        Promises as "then-ables"
      </button>
      <button 
      class="btn btn-link"
      (click)="promisesWithAsyncAwait()">
        Promises with async/await"
      </button>
      <button 
      class="btn btn-link"
      (click)="promisesFun()">
        Promises fun !!!
      </button>
    </li>
  @for (p of people$ | async; track p) {
    <li 
    class="list-group-item"
    >
      <label>
        <input 
          type="checkbox"
          class="form-check-input me-1"
        />

        {{ p }}
      </label>
    </li>
  }  
</ul>
