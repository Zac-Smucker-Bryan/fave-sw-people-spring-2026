<ul class="list-group">
  <li class="list-group-item list-group-item-secondary text-black-50">Tim's Faves</li>
  <li class="list-group-item" (click)="promisesAsThenables()">
    <button class="btn btn-link">Promises as "then-ables"</button>
  </li>

  <ng-container>
    @for (p of people$ | async; track p) {
      <li class="list-group-item">
        <label>
          <input type="checkbox" class="form-check-input me-1" />
          {{ p }}
        </label>
      </li>
    }
  </ng-container>
</ul>
